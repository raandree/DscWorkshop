NodeName: DSCFile01
Environment: Dev
Role: FileServer
Description: DSCFile01
Location: Frankfurt
Baseline: Server

ComputerSettings:
  Name: DSCFile01
  Description: '[x= "$($Node.Role) in $($Node.Environment)" =]'

NetworkIpConfiguration:
  Interfaces:
    - InterfaceAlias: DscWorkshop 0
      IpAddress: 192.168.111.100
      Prefix: 24
      Gateway: 192.168.111.50
      DnsServer:
        - 192.168.111.10
      DisableNetbios: true

PSDscAllowPlainTextPassword: True
PSDscAllowDomainUser: True

LcmConfig:
  ConfigurationRepositoryWeb:
    Server:
      ConfigurationNames: DSCFile01 #'[x={ $Node.NodeName }=]'

DscTagging:
  Layers:
    - '[x={ Get-DatumSourceFile -Path $File } =]'

FilesAndFolders:
  Items:
    - DestinationPath: Z:\DoesNotWork
      Type: Directory
